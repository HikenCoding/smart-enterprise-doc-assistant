<div class="flex h-screen bg-gray-900 text-white font-sans">
  <div class="w-64 bg-gray-800 p-4 border-r border-gray-700 flex flex-col">
    <h2 class="text-xl font-bold mb-6 text-blue-400">Smart Doc AI</h2>
    <button (click)="loadDocs()" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded mb-4 transition">
      Docs Scannen
    </button>
    
    <div class="flex-1 overflow-y-auto">
      <ul class="space-y-2">
        @for (doc of documents; track doc.fileName) {
          <li class="p-2 hover:bg-gray-700 rounded cursor-pointer border border-transparent hover:border-blue-500 text-sm truncate">
            📄 {{ doc.fileName }}
          </li>
        }
      </ul>
    </div>
  </div>

  <div class="flex-1 flex flex-col">
    <div class="flex-1 overflow-y-auto p-6 space-y-4">
      @if (chatHistory.length === 0) {
        <div class="text-center text-gray-500 mt-20">
          <p class="text-xl">Bereit für deine Fragen, Max!</p>
          <p class="text-sm">Scanne deine Docs und leg los.</p>
        </div>
      }
      
      @for (msg of chatHistory; track $index) {
        <div [ngClass]="msg.role === 'user' ? 'justify-end' : 'justify-start'" class="flex w-full">
          <div [ngClass]="msg.role === 'user' ? 'bg-blue-600' : 'bg-gray-700'" class="max-w-[80%] p-3 rounded-lg shadow">
            <p class="text-sm">{{ msg.text }}</p>
          </div>
        </div>
      }
    </div>

    <div class="p-4 bg-gray-800 border-t border-gray-700">
      <div class="flex gap-2">
        <input [(ngModel)]="currentQuestion" (keyup.enter)="sendQuestion()"
               type="text" placeholder="Frag etwas über deine PDFs..." 
               class="flex-1 bg-gray-700 border-none rounded p-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
        <button (click)="sendQuestion()" [disabled]="loading"
                class="bg-blue-600 px-6 py-2 rounded hover:bg-blue-700 disabled:opacity-50 transition">
          {{ loading ? '...' : 'Senden' }}
        </button>
      </div>
    </div>
  </div>
</div>
